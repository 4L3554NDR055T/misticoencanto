# render.yaml — Configuração Render (via Infrastructure as Code)
# Uso: Commit este arquivo no repo para facilitar deploys reprodutíveis

services:
  - type: web
    name: mistico-encanto
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SESSION_HOURS
        value: 8
      - key: RATE_LIMIT_MAX
        value: 10
      - key: RATE_LIMIT_MINUTES
        value: 15
      - key: MONGO_URI
        fromDatabase:
          name: mistico-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false
      - key: HASH_SALT
        sync: false
      - key: ALLOWED_ORIGINS
        value: '*'

databases:
  - name: mistico-db
    plan: free
    ipWhitelist:
      - source: 0.0.0.0/0
        description: Allow all for MongoDB Atlas
